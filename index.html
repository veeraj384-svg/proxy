<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Gateway</title>

  <!-- THIS LINE FIXES YOUR DESIGN -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="container">

    <h1>Nova Gateway</h1>

    <div class="window-body">
      <div class="gateway-label">Approved destination launcher</div>

      <div class="input-wrap">
        <input id="siteInput" type="text" placeholder="Enter URL">
        <button id="openBtn">Go</button>
      </div>

      <div class="quick-links">
        <button class="chip" data-link="https://github.com">GitHub</button>
        <button class="chip" data-link="https://www.wikipedia.org">Wikipedia</button>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
